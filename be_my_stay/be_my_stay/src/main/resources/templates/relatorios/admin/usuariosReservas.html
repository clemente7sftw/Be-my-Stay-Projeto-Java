<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <title>Relatório | Be My Stay</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1, h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }

        img {
            display: block;
            margin: 0 auto;
            width: 120px;
        }
    </style>
</head>

<body>


<h1>Be My Stay</h1>
<hr/>

<h2>Relatório de Usuários com Mais Reservas</h2>
<hr/>

<p>
    Data de geração:
    <span th:text="${#temporals.format(dataGeracao, 'dd/MM/yyyy')}"></span>
</p>

<table>
    <thead>
    <tr>
        <th>Email</th>
        <th>Quantidade de Reservas</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${usuarios}">
        <td th:text="${u[0]}"></td>
        <td th:text="${u[1]}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
