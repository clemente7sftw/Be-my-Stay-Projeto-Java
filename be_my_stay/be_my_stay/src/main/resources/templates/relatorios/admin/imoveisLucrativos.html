<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Relatório - Imóveis Mais Lucrativos</title>

    <style>
        body { font-family: Arial; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 8px; }
        th { background-color: #f2f2f2; }
        .ranking {
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Be My Stay</h1>
<hr/>

<h1>Relatório de Imóveis Mais Lucrativos</h1>
<hr/>



<table>
    <tr>
        <th>ID</th>
        <th>Imóvel</th>
        <th>Total de Reservas</th>
        <th>Total Arrecadado</th>
    </tr>

    <tr th:each="i, stat : ${imoveis}">
        <td class="ranking" th:text="${stat.index + 1}"></td>
        <td th:text="${i[0]}"></td>
        <td th:text="${i[1]}"></td>
        <td th:text="${'R$ ' + i[2]}"></td>
    </tr>

</table>

</body>
</html>
