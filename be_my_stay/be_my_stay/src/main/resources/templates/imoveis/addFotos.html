<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imóvel | Be my Stay</title>

    <link rel="icon" type="image/png" th:href="@{/assets/Logo.png}">
    <link rel="stylesheet" th:href="@{/css/addFoto.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet">
</head>
<body>
<header>

    <img th:src="@{/assets/logo.png}">
    <span>Be my stay</span>
</header>


<main>

    <p>Adicione Fotos do Imóvel</p>

    <div class="conteudo">
        <form th:action="@{/imovel/salvarFoto}"
              method="post"
              enctype="multipart/form-data"
              th:object="${imovel}">

            <label for="imagens">
                <img th:src="@{/assets/add_fotos.png}" class="img-upload">
            </label>

            <input type="file"
                   id="imagens"
                   name="imagens"
                   multiple
                   accept="image/*"
                   required>

            <button type="submit">Próximo</button>
        </form>
    </div>
</main>


</body>
</html>
