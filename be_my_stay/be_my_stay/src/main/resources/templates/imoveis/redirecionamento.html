<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Tela Inicial | Be my Stay</title>

  <link rel="icon" type="image/png" th:href="@{/assets/Logo.png}">
  <link rel="stylesheet" th:href="@{/css/listagem.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
<div class="conteudo" >

  <div th:replace="anfitriao/anfitriao :: aside"></div>



  <main>
    <p th:if="${erro}" th:text="${erro}" style="color:red"></p>
    <a class="aux" href="/imovel/criar">Criar <img th:src="@{/assets/add.png}"></a> <br>
    <a class="aux" href="/anfitriao/listarInativas">Restaurar <img th:src="@{/assets/restore-bin.png}"></a>

    <table class="tabela">
      <thead>
      <tr>
        <th>ID Imóvel</th>
        <th>Título</th>
        <th>Data de Criação</th>
        <th>Editar</th>
        <th>Excluir</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="i : ${imoveis}">

        <td th:text="${i.id}"></td>

        <td th:text="${i.titulo}"></td>

        <td th:text="${i.dataCadastro}"></td>

        <td>
          <a th:href="@{/imovel/editarAnfitriao/{id}(id=${i.id})}">
            <img th:src="@{/assets/file-edit.png}" alt="Editar">
          </a>
        </td>

        <td>
          <form th:action="@{/imovel/deletarAnfitriao/{id}(id=${i.id})}" method="post">
            <button type="submit">
              <img th:src="@{/assets/file-remove.png}" alt="Excluir">
            </button>
          </form>
        </td>

      </tr>
      </tbody>
    </table>
  </main>

</div>
  <form th:action="@{/imovel/listarAnfitriao}" method="get">
    <div class="main_conteudo">
      <h1>Postado com Sucesso!</h1>
      <p>Parabéns, seu imóvel foi postado, e já esta disponível para reservas</p>
      <p>clique aqui para ser direcionado a página principal</p>
      <button class="redirecionamento" type="submit" >Redirecione</button>
    </div>
  </form>
</body>

</html>
